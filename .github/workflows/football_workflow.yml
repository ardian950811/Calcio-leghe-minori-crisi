name: Football Crisis Radar Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      teams_list:
        description: 'List of teams pasted from the website'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  run-scrp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required tools
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Execute radar investigation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Corretto da TEAMS_INPUT a TEAMS_LIST per farlo combaciare con Python
          TEAMS_LIST: ${{ github.event.inputs.teams_list }}
        run: python football_radar.py

      - name: Commit and push updated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add crisis_report.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: crisis report" && git push)
