name: Schedule Analyzer Bot

on:
  workflow_dispatch:
    inputs:
      schedule_data:
        description: 'Raw schedule text pasted from the HTML frontend'
        required: true
        type: string

permissions:
  contents: write

jobs:
  analyze_and_search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python Analyzer
        # Il testo del palinsesto viene passato in modo sicuro come variabile di ambiente
        env:
          SCHEDULE_INPUT: ${{ inputs.schedule_data }}
        run: python scraper.py

      - name: Commit and Push Results
        # Salva il file JSON con i risultati e lo carica nel repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add news_results.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update crisis news results"
          git push
