<script>
// ... (funzione triggerGitHubAction invariata) ...

function updateTable(data) {
    const tbody = document.getElementById('table_body');
    const events = data.events; // Ora leggiamo dall'oggetto events
    tbody.innerHTML = ''; 

    // Visualizzazione del log temporale
    const statusDiv = document.getElementById('actionStatus');
    statusDiv.innerHTML = `<small>Ultima scansione: ${data.last_check}</small>`;

    if(events.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #4CAF50;">✅ Nessuna crisi rilevata. Sistema operativo.</td></tr>';
        return;
    }

    events.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${item.team}</strong></td>
            <td><span style="color: red;">${item.keyword.toUpperCase()}</span></td>
            <td><a href="${item.link}" target="_blank" style="color:white;">${item.title}</a></td>
        `;
        tbody.appendChild(row);
    });
}
</script>
