<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Notizie Squadre</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .news-card { background-color: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #00ff88; }
        .team-name { color: #00ff88; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .news-title { font-size: 16px; margin-bottom: 10px; }
        a.btn { display: inline-block; padding: 8px 15px; background-color: #00ff88; color: #121212; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .header { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📡 Radar Notizie (Ultimi 4 Giorni)</h1>
        <p id="last-update">Caricamento dati...</p>
    </div>

    <div id="news-container"></div>
</div>

<script>
    fetch('crisis_report.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('last-update').innerText = "Ultimo aggiornamento: " + data.last_check;
            
            const container = document.getElementById('news-container');
            if (data.events.length === 0) {
                container.innerHTML = "<p>Nessuna notizia trovata per le squadre in lista.</p>";
                return;
            }

            data.events.forEach(event => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="team-name">${event.team}</div>
                    <div class="news-title">${event.title}</div>
                    <a href="${event.link}" target="_blank" class="btn">Apri Articolo Originale</a>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            document.getElementById('news-container').innerHTML = "<p>Errore nel caricamento delle notizie. Avvia il radar per generare il file.</p>";
        });
</script>

</body>
</html>
